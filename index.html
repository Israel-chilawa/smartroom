<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ESP32 LED Control</title>
</head>
<body>

<h1>ESP32 LED Control</h1>

<button onclick="sendCommand('on')">🔵 LED ON</button>

<button onclick="sendCommand('off')">⚫ LED OFF</button>

<button onclick="sendCommand('blink')">✨ BLINK</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyC6irPxRxRto4v7LOjBjpyizr8zPyLXyHo",
  authDomain: "blinkesp32-210f3.firebaseapp.com",
  databaseURL: "https://blinkesp32-210f3-default-rtdb.firebaseio.com",
  projectId: "blinkesp32-210f3",
  storageBucket: "blinkesp32-210f3.firebasestorage.app",
  messagingSenderId: "696920285887",
  appId: "1:696920285887:web:7621652a22a13eb2781c0a",
  measurementId: "G-YTL21V6G8W"
};

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain: "YOUR_PROJECT.firebaseapp.com",

  databaseURL: "YOUR_DATABASE_URL",

  projectId: "YOUR_PROJECT_ID",

  storageBucket: "YOUR_PROJECT.appspot.com",

  messagingSenderId: "YOUR_SENDER_ID",

  appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.sendCommand = function(cmd){

  set(ref(db,'led/command'),cmd);

}

</script>

</body>
</html>
